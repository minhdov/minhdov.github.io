      institution: Hardware and Embedded System Lab, School of Computer Science and Engineering, Nanyang Technological University, Singapore.
      year: 2020-2023
      description:
        - Conducted the research in multi target multi camera tracking system on embedded computing platform.
        - The research aims to develop real-time, low-cost, low-power, scalable and robusted multiple object tracking crossing multiple non/overlapping cameras.
